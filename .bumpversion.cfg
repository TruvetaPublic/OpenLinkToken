[bumpversion]
current_version = 2.0.0-alpha
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-(?P<prerelease>[0-9A-Za-z.-]+))?
serialize =
	{major}.{minor}.{patch}-{prerelease}
	{major}.{minor}.{patch}
commit = False
tag = False

[bumpversion:file:lib/java/pom.xml]
search = <version>{current_version}</version>
replace = <version>{new_version}</version>

[bumpversion:file:lib/java/openlinktoken/pom.xml]
search = <version>{current_version}</version>
replace = <version>{new_version}</version>

[bumpversion:file:lib/java/openlinktoken/src/main/java/org/openlinktoken/Metadata.java]
search = DEFAULT_VERSION = "{current_version}";
replace = DEFAULT_VERSION = "{new_version}";

[bumpversion:file:lib/python/openlinktoken/pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:lib/python/openlinktoken/src/main/openlinktoken/metadata.py]
search = DEFAULT_VERSION = "{current_version}"
replace = DEFAULT_VERSION = "{new_version}"

