name: "Setup Toolchain"
description: "Install shared Java and/or Python toolchains with caching"
inputs:
  enable-java:
    description: "Whether to set up Java (true/false)"
    required: false
    default: "true"
  java-version:
    description: "Version string passed to actions/setup-java"
    required: false
    default: "21"
  java-distribution:
    description: "Distribution for actions/setup-java"
    required: false
    default: "corretto"
  java-cache:
    description: "Cache strategy for actions/setup-java"
    required: false
    default: "maven"
  enable-python:
    description: "Whether to set up Python (true/false)"
    required: false
    default: "true"
  python-version:
    description: "Python version to install"
    required: false
    default: "3.10"
runs:
  using: "composite"
  steps:
    - name: Set up JDK
      if: inputs.enable-java == 'true'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: ${{ inputs.java-cache }}
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

     # Add Sonatype server credentials to the generated settings.xml
    - name: Add Sonatype credentials to settings.xml
      if: inputs.enable-java == 'true'
      run: |
        cat >> "$GITHUB_WORKSPACE/settings.xml" << 'EOF'
        <servers>
          <server>
            <id>sonatype</id>
            <username>${env.SONATYPE_USERNAME}</username>
            <password>${env.SONATYPE_PASSWORD}</password>
          </server>
        </servers>
EOF
        echo "Added sonatype server to settings.xml"
      env:
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

    - name: Set up Python
      if: inputs.enable-python == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up UV
      if: inputs.enable-python == 'true'
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
