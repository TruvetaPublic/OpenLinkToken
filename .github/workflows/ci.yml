name: Core CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

env:
  MIN_COVERAGE_OVERALL: 60
  MIN_COVERAGE_CHANGED_FILES: 80
  MIN_COVERAGE_OVERALL_RATIO: 0.6
  MIN_COVERAGE_CHANGED_FILES_RATIO: 0.8

jobs:
  java-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write
      statuses: write
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (Java)
        uses: ./.github/actions/setup-toolchain
        with:
          enable-python: false

      - name: Build and test with Maven
        run: cd lib/java && mvn -B package --file pom.xml

      - name: Publish Maven Surefire report
        if: success() || failure()
        uses: scacap/action-surefire-report@v1

      - name: Publish Java unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            lib/java/opentoken/target/surefire-reports/*.xml
          check_name: Java Test Results
          comment_mode: always
          compare_to_earlier_commit: false

      - name: Generate JaCoCo report
        run: cd lib/java && mvn jacoco:report

      - name: Upload JaCoCo artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-code-coverage
          path: |
            lib/java/opentoken/target/site/jacoco/*

      - name: Add Java code coverage to PR
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: |
            lib/java/opentoken/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          min-coverage-overall: ${{ env.MIN_COVERAGE_OVERALL }}
          min-coverage-changed-files: ${{ env.MIN_COVERAGE_CHANGED_FILES }}
          pass-emoji: ":green_circle:"
          fail-emoji: ":red_circle:"
          update-comment: true

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v3
        with:
          directory: ${{ github.workspace }}/lib/java
          maven-args: "-B -DskipTests"

  python-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: read
      packages: write
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (Python)
        uses: ./.github/actions/setup-toolchain
        with:
          enable-java: false
          enable-python: true
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          uv pip install --system -r lib/python/opentoken/requirements.txt pytest pytest-cov ruff -e lib/python/opentoken/

      - name: Lint with ruff
        run: |
          ruff check lib/python/opentoken/src

      - name: Test with pytest
        run: |
          PYTHONPATH=lib/python/opentoken/src/main pytest lib/python/opentoken/src/test --junitxml=lib/python/opentoken/test-results-${{ matrix.python-version }}.xml --cov=lib/python/opentoken/src/main --cov-report=xml:lib/python/opentoken/coverage.xml --cov-report=html:lib/python/opentoken/htmlcov

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-code-coverage-${{ matrix.python-version }}
          path: |
            lib/python/opentoken/coverage.xml
            lib/python/opentoken/htmlcov/*

      - name: Upload Python JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-junit-core-${{ matrix.python-version }}
          path: |
            lib/python/opentoken/test-results-${{ matrix.python-version }}.xml

      - name: Publish Python unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            lib/python/opentoken/test-results-${{ matrix.python-version }}.xml
          check_name: Python ${{ matrix.python-version }} Test Results
          comment_mode: off
          compare_to_earlier_commit: false

      - name: Add Python code coverage to PR
        if: matrix.python-version == '3.10'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: lib/python/opentoken/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: ${{ env.MIN_COVERAGE_OVERALL_RATIO }}
          thresholdNew: ${{ env.MIN_COVERAGE_CHANGED_FILES_RATIO }}
          thresholdModified: ${{ env.MIN_COVERAGE_CHANGED_FILES_RATIO }}

  python-cli-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: read
      packages: write
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (Python)
        uses: ./.github/actions/setup-toolchain
        with:
          enable-java: false
          enable-python: true
          python-version: ${{ matrix.python-version }}

      - name: Install Python CLI dependencies
        run: |
          uv pip install --system -r lib/python/opentoken/requirements.txt -e lib/python/opentoken/ -r lib/python/opentoken-cli/requirements.txt pytest pytest-cov ruff -e lib/python/opentoken-cli/

      - name: Lint CLI with ruff
        run: |
          ruff check lib/python/opentoken-cli/src

      - name: Test CLI with pytest
        run: |
          PYTHONPATH=lib/python/opentoken/src/main:lib/python/opentoken-cli/src/main pytest lib/python/opentoken-cli/src/test --junitxml=lib/python/opentoken-cli/test-results-${{ matrix.python-version }}.xml --cov=lib/python/opentoken-cli/src/main --cov-report=xml:lib/python/opentoken-cli/coverage.xml --cov-report=html:lib/python/opentoken-cli/htmlcov

      - name: Upload Python CLI coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-cli-code-coverage-${{ matrix.python-version }}
          path: |
            lib/python/opentoken-cli/coverage.xml
            lib/python/opentoken-cli/htmlcov/*

      - name: Upload Python CLI JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-junit-cli-${{ matrix.python-version }}
          path: |
            lib/python/opentoken-cli/test-results-${{ matrix.python-version }}.xml

      - name: Publish Python CLI test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            lib/python/opentoken-cli/test-results-${{ matrix.python-version }}.xml
          check_name: Python CLI ${{ matrix.python-version }} Test Results
          comment_mode: off
          compare_to_earlier_commit: false

      - name: Run CLI smoke test
        run: |
          cd lib/python/opentoken-cli
          mkdir -p target
          opentoken package -i ../../../resources/sample.csv -t csv -o target/output.csv --hashingsecret "HashingKey" --encryptionkey "Secret-Encryption-Key-Goes-Here."

      - name: Validate CLI output files
        run: |
          cd lib/python/opentoken-cli
          if [ ! -f "target/output.csv" ]; then
            echo "Error: output.csv not created"
            exit 1
          fi
          if [ ! -f "target/output.metadata.json" ]; then
            echo "Error: metadata file not created"
            exit 1
          fi

      - name: Validate CLI output content
        run: |
          cd lib/python/opentoken-cli
          line_count=$(wc -l < target/output.csv)
          if [ "$line_count" -le 1 ]; then
            echo "Error: Output CSV appears to be empty or only contains headers"
            exit 1
          fi
          echo "Output CSV contains $line_count lines"

  pyspark-bridge-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: read
      packages: write
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        spark-version: ["3.4", "3.5", "4.0", "4.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain (Python + Java for PySpark)
        uses: ./.github/actions/setup-toolchain
        with:
          enable-java: true # PySpark requires Java
          enable-python: true
          python-version: ${{ matrix.python-version }}
          # Spark 3.4/3.5 require Java 8-17, Spark 4.0+ requires Java 21
          java-version: ${{ (matrix.spark-version == '4.0' || matrix.spark-version == '4.1') && '21' || '17' }}

      - name: Install OpenToken core library
        run: |
          uv pip install --system -r lib/python/opentoken/requirements.txt -e lib/python/opentoken/

      - name: Install PySpark bridge dependencies (Spark ${{ matrix.spark-version }})
        run: |
          uv pip install --system pytest pytest-cov ruff
          if [ "${{ matrix.spark-version }}" = "4.0" ]; then
            uv pip install --system -e "lib/python/opentoken-pyspark[spark40]"
          elif [ "${{ matrix.spark-version }}" = "4.1" ]; then
            uv pip install --system -e "lib/python/opentoken-pyspark[spark41]"
          elif [ "${{ matrix.spark-version }}" = "3.4" ]; then
            uv pip install --system -e "lib/python/opentoken-pyspark[spark34]"
          elif [ "${{ matrix.spark-version }}" = "3.5" ]; then
            uv pip install --system -e "lib/python/opentoken-pyspark[spark35]"
          else
            echo "Unsupported Spark version for PySpark bridge: '${{ matrix.spark-version }}'."
            echo "Please update .github/workflows/ci.yml to handle this Spark version."
            exit 1
          fi
          uv pip install --system -r lib/python/opentoken-pyspark/dev-requirements.txt

      - name: Lint with ruff
        run: |
          ruff check lib/python/opentoken-pyspark/src/main/opentoken_pyspark

      - name: Test PySpark bridge
        run: |
          PYTHONPATH=lib/python/opentoken/src/main:lib/python/opentoken-pyspark/src/main pytest lib/python/opentoken-pyspark/src/test --junitxml=lib/python/opentoken-pyspark/test-results-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml --cov=lib/python/opentoken-pyspark/src/main/opentoken_pyspark --cov-report=xml:lib/python/opentoken-pyspark/coverage-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml --cov-report=html:lib/python/opentoken-pyspark/htmlcov-${{ matrix.python-version }}-spark${{ matrix.spark-version }}

      - name: Upload PySpark coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyspark-code-coverage-${{ matrix.python-version }}-spark${{ matrix.spark-version }}
          path: |
            lib/python/opentoken-pyspark/coverage-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml
            lib/python/opentoken-pyspark/htmlcov-${{ matrix.python-version }}-spark${{ matrix.spark-version }}/*

      - name: Upload PySpark JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-junit-pyspark-${{ matrix.python-version }}-spark${{ matrix.spark-version }}
          path: |
            lib/python/opentoken-pyspark/test-results-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml

      - name: Publish PySpark test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            lib/python/opentoken-pyspark/test-results-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml
          check_name: PySpark Bridge ${{ matrix.python-version }} Spark ${{ matrix.spark-version }} Test Results
          comment_mode: off
          compare_to_earlier_commit: false

      - name: Add PySpark code coverage to PR
        if: matrix.python-version == '3.10' && matrix.spark-version == '4.0'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: lib/python/opentoken-pyspark/coverage-${{ matrix.python-version }}-spark${{ matrix.spark-version }}.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: ${{ env.MIN_COVERAGE_OVERALL_RATIO }}
          thresholdNew: ${{ env.MIN_COVERAGE_CHANGED_FILES_RATIO }}
          thresholdModified: ${{ env.MIN_COVERAGE_CHANGED_FILES_RATIO }}

  python-test-results-comment:
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - python-cli-tests
      - pyspark-bridge-tests
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download Python JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-junit-*
          path: test-results

      - name: Build consolidated Python test summary
        id: build-summary
        run: |
          python - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          marker = "<!-- python-tests-sticky-comment -->"
          files = sorted(glob.glob("test-results/**/*.xml", recursive=True))

          def to_int(value):
              try:
                  return int(value)
              except Exception:
                  return 0

          def to_float(value):
              try:
                  return float(value)
              except Exception:
                  return 0.0

          def parse_junit(path):
              root = ET.parse(path).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              tests = sum(to_int(s.attrib.get("tests", "0")) for s in suites)
              failures = sum(to_int(s.attrib.get("failures", "0")) for s in suites)
              errors = sum(to_int(s.attrib.get("errors", "0")) for s in suites)
              skipped = sum(to_int(s.attrib.get("skipped", s.attrib.get("disabled", "0"))) for s in suites)
              duration = sum(to_float(s.attrib.get("time", "0")) for s in suites)
              return tests, failures, errors, skipped, duration

          def label_for(filename):
              artifact_name = os.path.basename(os.path.dirname(filename))
              if artifact_name.startswith("python-junit-core-"):
                  version = artifact_name.removeprefix("python-junit-core-")
                  return f"Python Core {version}", (0, version, "")
              if artifact_name.startswith("python-junit-cli-"):
                  version = artifact_name.removeprefix("python-junit-cli-")
                  return f"Python CLI {version}", (1, version, "")
              if artifact_name.startswith("python-junit-pyspark-"):
                  version_spark = artifact_name.removeprefix("python-junit-pyspark-")
                  version, spark = version_spark.split("-spark", 1)
                  return f"PySpark Bridge {version} / Spark {spark}", (2, version, spark)
              return artifact_name, (9, artifact_name, "")

          rows = []
          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0, "time": 0.0}

          for path in files:
              label, sort_key = label_for(path)
              tests, failures, errors, skipped, duration = parse_junit(path)
              passed = max(tests - failures - errors - skipped, 0)
              status = "✅" if failures == 0 and errors == 0 else "❌"
              rows.append((sort_key, label, status, tests, passed, failures, errors, skipped, duration))

              totals["tests"] += tests
              totals["failures"] += failures
              totals["errors"] += errors
              totals["skipped"] += skipped
              totals["time"] += duration

          rows.sort(key=lambda x: x[0])
          total_passed = max(totals["tests"] - totals["failures"] - totals["errors"] - totals["skipped"], 0)
          overall_status = "✅" if totals["failures"] == 0 and totals["errors"] == 0 else "❌"

          lines = [
              marker,
              "## 🐍 Consolidated Python Test Results",
              "",
              f"**Overall**: {overall_status}  **{totals['tests']} tests** · {total_passed} passed · {totals['failures']} failed · {totals['errors']} errors · {totals['skipped']} skipped · {totals['time']:.1f}s",
              "",
          ]

          if rows:
              lines.extend([
                  "| Suite | Status | Tests | Passed | Failed | Errors | Skipped | Time |",
                  "|---|---:|---:|---:|---:|---:|---:|---:|",
              ])
              for _, label, status, tests, passed, failures, errors, skipped, duration in rows:
                  lines.append(
                      f"| {label} | {status} | {tests} | {passed} | {failures} | {errors} | {skipped} | {duration:.1f}s |"
                  )
          else:
              lines.append("No Python JUnit XML files were found for this run.")

          lines.extend([
              "",
              f"Results for commit {os.environ.get('GITHUB_SHA', '')[:7]}.",
              "",
              "♻️ This comment has been updated with latest results.",
          ])

          body = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("body<<EOF\n")
              fh.write(body)
              fh.write("\nEOF\n")
          PY

      - name: Upsert sticky Python test comment
        if: always() && steps.build-summary.outcome == 'success' && steps.build-summary.outputs.body != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const commentMarker = '<!-- python-tests-sticky-comment -->';
            const body = `${{ steps.build-summary.outputs.body }}`;

            if (!body || !body.trim()) {
              core.info('Skipping sticky Python test comment update because the summary body is empty.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingStickyComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(commentMarker)
            );

            const legacyPythonComments = comments.filter(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              /Python(?: CLI)?\s\d+\.\d+\sTest Results|PySpark Bridge\s\d+\.\d+\sSpark\s\d+\.\d+\sTest Results/.test(comment.body) &&
              (!existingStickyComment || comment.id !== existingStickyComment.id)
            );

            for (const comment of legacyPythonComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
              core.info(`Deleted legacy Python result comment: ${comment.id}`);
            }

            if (existingStickyComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingStickyComment.id,
                body,
              });
              core.info(`Updated sticky Python test comment: ${existingStickyComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created sticky Python test comment');
            }

  interoperability-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup toolchain (Python)
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: "3.10"
          enable-java: false

      - name: Install Python dependencies
        run: |
          uv pip install --system -e lib/python/opentoken -e lib/python/opentoken-cli -e "lib/python/opentoken-pyspark[spark40]"

      - name: Install interoperability tool dependencies
        run: |
          cd tools
          if [ -f requirements.txt ]; then
            uv pip install --system -r requirements.txt
          fi

      - name: Run interoperability tests
        id: run-tests
        run: |
          cd tools/interoperability
          python multi_language_interoperability_test.py

      - name: Upload interoperability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interoperability-test-results
          path: |
            /tmp/*output*.csv
            /tmp/*decrypted*.csv
            tools/interoperability/*.log
          retention-days: 7

      - name: Summarize interoperability results
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
            {
              echo "## Interoperability Tests Passed"
              echo
              echo "Python CLI produces correct token output and consistent metadata."
              echo
              echo "**Environment:** Python 3.10 on Ubuntu"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Interoperability Tests Failed"
              echo
              echo "Check the job logs and uploaded artifacts for comparison details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
