name: Build OpenToken CLI (PyInstaller)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          version=$(sed -n '/^\[bumpversion\]/,/^\[/p' .bumpversion.cfg | grep "^current_version" | sed 's/^current_version = //')
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Detected version: ${version}"

  build:
    needs: version
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up UV
        uses: astral-sh/setup-uv@v6

      - name: Install build dependencies
        run: |
          uv pip install -e lib/python/opentoken
          uv pip install -r lib/python/opentoken-cli/pyinstaller-requirements.txt
          uv pip install -r lib/python/opentoken-cli/requirements.txt
          uv pip install -e lib/python/opentoken-cli --no-deps

      - name: Build CLI binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # Build universal binary for macOS (both x86_64 and arm64)
            pyinstaller --clean --noconfirm --target-arch universal2 lib/python/opentoken-cli/opentoken-cli.spec
          else
            pyinstaller --clean --noconfirm lib/python/opentoken-cli/opentoken-cli.spec
          fi

      - name: Smoke test (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p smoke
          cp resources/sample.csv smoke/input.csv
          ./dist/opentoken tokenize -i smoke/input.csv -t csv -o smoke/out.csv -h secret

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          Copy-Item resources\sample.csv smoke\input.csv
          .\dist\opentoken.exe tokenize -i smoke\input.csv -t csv -o smoke\out.csv -h secret

      - name: Prepare and zip artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"

          # Determine platform name
          case "${{ runner.os }}" in
            Linux)   PLATFORM="linux-x64" ;;
            macOS)   PLATFORM="macos-universal" ;;
            Windows) PLATFORM="windows-x64" ;;
          esac

          # Create versioned directory
          PACKAGE_NAME="opentoken-cli-${VERSION}-${PLATFORM}"
          mkdir -p "${PACKAGE_NAME}"

          # Copy executable
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "dist/opentoken.exe" "${PACKAGE_NAME}/"
          else
            cp "dist/opentoken" "${PACKAGE_NAME}/"
          fi

          # Create zip file
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path '${PACKAGE_NAME}' -DestinationPath '${PACKAGE_NAME}.zip'"
          else
            zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"
          fi

          echo "Created ${PACKAGE_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentoken-cli-${{ needs.version.outputs.version }}-${{ matrix.os }}
          path: opentoken-cli-*.zip
          if-no-files-found: error
